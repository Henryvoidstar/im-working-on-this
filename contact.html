<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Henry | Contact</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #070b10;
    color: #eaeaea;
    overflow-x: hidden;
}

/* ===== GRID BACKGROUND ===== */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background:
        linear-gradient(rgba(76,201,240,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(76,201,240,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: moveGrid 20s linear infinite;
    z-index: 0;
}

@keyframes moveGrid {
    from { transform: translate(0,0); }
    to { transform: translate(-60px,-60px); }
}

/* ===== SCAN LINE ===== */
.scanline {
    position: fixed;
    width: 100%;
    height: 2px;
    background: rgba(76,201,240,0.2);
    box-shadow: 0 0 20px rgba(76,201,240,0.4);
    animation: scan 6s linear infinite;
    z-index: 1;
}

@keyframes scan {
    0% { top: 0%; }
    100% { top: 100%; }
}

/* CONTENT */
.content {
    position: relative;
    z-index: 2;
}

/* HEADER */
header {
    text-align: center;
    padding: 70px 20px 20px;
}

.nav {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 15px;
}

.nav a {
    padding: 8px 16px;
    background: rgba(76,201,240,0.1);
    border: 1px solid rgba(76,201,240,0.3);
    border-radius: 8px;
    color: #4cc9f0;
    text-decoration: none;
    transition: 0.3s;
    font-size: 0.9em;
}

.nav a:hover {
    background: rgba(76,201,240,0.2);
    transform: scale(1.05);
}

h1 {
    font-size: 3.2em;
    margin: 0;
    color: #4cc9f0;
    text-shadow: 0 0 25px rgba(76,201,240,0.6);
    letter-spacing: 2px;
}

.subtitle {
    color: #9aa4ad;
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

/* HUD CARD */
.card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(76,201,240,0.15);
    border-radius: 14px;
    padding: 22px;
    margin: 18px 0;
    backdrop-filter: blur(10px);
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

.card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-left: 2px solid rgba(76,201,240,0.3);
    opacity: 0;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px) scale(1.01);
    box-shadow: 0 0 35px rgba(76,201,240,0.15);
}

.card:hover::before {
    opacity: 1;
}

h2 {
    color: #4cc9f0;
    margin-top: 0;
}

/* CONTACT FORM */
.contact-form {
    display: grid;
    gap: 15px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

label {
    margin-bottom: 5px;
    color: #4cc9f0;
}

input, textarea {
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(76,201,240,0.2);
    border-radius: 8px;
    color: #eaeaea;
    font-family: inherit;
}

input:focus, textarea:focus {
    outline: none;
    border-color: #4cc9f0;
    box-shadow: 0 0 10px rgba(76,201,240,0.3);
}

button {
    padding: 12px 24px;
    background: rgba(76,201,240,0.1);
    border: 1px solid rgba(76,201,240,0.3);
    border-radius: 8px;
    color: #4cc9f0;
    cursor: pointer;
    transition: 0.3s;
    font-family: inherit;
    font-size: 1em;
}

button:hover {
    background: rgba(76,201,240,0.2);
    box-shadow: 0 0 15px rgba(76,201,240,0.4);
}

/* LINKS */
a {
    color: #4cc9f0;
    text-decoration: none;
}
a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="scanline"></div>

<div class="content">

<header>
    <div class="nav">
        <a href="portfoliov2.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </div>
    <h1>📫 Contact</h1>
    <p class="subtitle">ESTABLISH COMMUNICATION LINK</p>
</header>

<div class="container">

<div class="card">
    <h2>📧 Direct Contact</h2>
    <p><strong>Email:</strong> <a href="mailto:henryghart03@gmail.com">henryghart03@gmail.com</a></p>
    <p><strong>GitHub:</strong> <a href="https://github.com/Henryvoidstar/henrys_portfolio/tree/main" target="_blank">Repository</a></p>
    <p><strong>Location:</strong> [Your Location]</p>
</div>

<div class="card">
    <h2>💬 Send Message</h2>
    <form class="contact-form" action="#" method="post">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="subject">Subject:</label>
            <input type="text" id="subject" name="subject" required>
        </div>
        <div class="form-group">
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="6" required></textarea>
        </div>
        <button type="submit">Transmit Message</button>
    </form>
</div>

</div>
</div>

</body>
</html>
