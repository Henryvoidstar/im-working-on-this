<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Henry | Gallery</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #070b10;
    color: #eaeaea;
    overflow-x: hidden;
}

/* ===== GRID BACKGROUND ===== */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background:
        linear-gradient(rgba(76,201,240,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(76,201,240,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: moveGrid 20s linear infinite;
    z-index: 0;
}

@keyframes moveGrid {
    from { transform: translate(0,0); }
    to { transform: translate(-60px,-60px); }
}

/* ===== SCAN LINE ===== */
.scanline {
    position: fixed;
    width: 100%;
    height: 2px;
    background: rgba(76,201,240,0.2);
    box-shadow: 0 0 20px rgba(76,201,240,0.4);
    animation: scan 6s linear infinite;
    z-index: 1;
}

@keyframes scan {
    0% { top: 0%; }
    100% { top: 100%; }
}

/* CONTENT */
.content {
    position: relative;
    z-index: 2;
}

/* HEADER */
header {
    text-align: center;
    padding: 70px 20px 20px;
}

.nav {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 15px;
}

.nav a {
    padding: 8px 16px;
    background: rgba(76,201,240,0.1);
    border: 1px solid rgba(76,201,240,0.3);
    border-radius: 8px;
    color: #4cc9f0;
    text-decoration: none;
    transition: 0.3s;
    font-size: 0.9em;
}

.nav a:hover {
    background: rgba(76,201,240,0.2);
    transform: scale(1.05);
}

h1 {
    font-size: 3.2em;
    margin: 0;
    color: #4cc9f0;
    text-shadow: 0 0 25px rgba(76,201,240,0.6);
    letter-spacing: 2px;
}

.subtitle {
    color: #9aa4ad;
}

/* CONTAINER */
.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

/* GALLERY GRID */
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
}

/* HUD CARD */
.card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(76,201,240,0.15);
    border-radius: 14px;
    padding: 22px;
    margin: 18px 0;
    backdrop-filter: blur(10px);
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

.card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-left: 2px solid rgba(76,201,240,0.3);
    opacity: 0;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px) scale(1.01);
    box-shadow: 0 0 35px rgba(76,201,240,0.15);
}

.card:hover::before {
    opacity: 1;
}

h2 {
    color: #4cc9f0;
    margin-top: 0;
}

/* GALLERY ITEM */
.gallery-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(76,201,240,0.15);
    border-radius: 14px;
    overflow: hidden;
    transition: 0.3s;
    position: relative;
}

.gallery-item:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 0 35px rgba(76,201,240,0.15);
}

.gallery-item img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
}

.gallery-item .caption {
    padding: 15px;
    background: rgba(0,0,0,0.7);
    color: #eaeaea;
}

.gallery-item .title {
    font-size: 1.2em;
    color: #4cc9f0;
    margin: 0 0 5px 0;
}

.gallery-item .description {
    margin: 0;
    font-size: 0.9em;
    color: #aaa;
}

/* LINKS */
a {
    color: #4cc9f0;
    text-decoration: none;
}
a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="scanline"></div>

<div class="content">

<header>
    <div class="nav">
        <a href="portfoliov2.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </div>
    <h1>Gallery</h1>
                <span <div class="gallery-item">
    <img src="tank_game.png" alt="Tank Game">
    <div class="caption">
        <div class="title">Tank Game</div>
        <div class="description">
            2D tank combat prototype with movement, obstacles, and health system.
        </div>
    </div>
</div></span>
            </div>
            <div class="caption">
                <div class="title">Future Project</div>
                <div class="description">Coming soon...</div>
            </div>
        </div>
    </div>
</div>

</div>
</div>

</body>
</html>
